<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f0f4f8;
}

nav {
    background: #0f766e;
    padding: 15px 20px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
}

nav a {
    color: white;
    font-weight: 600;
    text-decoration: none;
    transition: color 0.3s;
}

nav a:hover {
    color: #a7f3d0;
}

form input, form textarea {
    transition: all 0.3s;
}

form input:focus, form textarea:focus {
    outline: none;
    border-color: #0f766e;
    box-shadow: 0 0 5px rgba(15,118,110,0.5);
}
</style>
</head>
<body>

<!-- Navigation -->
<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="service.html">Service</a>
    <a href="contact.html">Contact</a>
</nav>

<!-- Main Content -->
<main class="max-w-lg mx-auto mt-12 mb-12 p-8 bg-white rounded-xl shadow-lg">
    <h1 class="text-3xl font-extrabold text-center text-green-700 mb-4">Contact Us</h1>
    <p class="text-center text-gray-600 mb-6">Fill out the form below to reach us.</p>

    <form action="#" method="post" class="space-y-4">
        <div>
            <label for="name" class="block font-semibold mb-1">Name</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required
                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-300">
        </div>

        <div>
            <label for="email" class="block font-semibold mb-1">Email</label>
            <input type="email" id="email" name="email" placeholder="Your Email" required
                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-300">
        </div>

        <div>
            <label for="message" class="block font-semibold mb-1">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Your Message" required
                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-300"></textarea>
        </div>

        <button type="submit" class="w-full bg-green-700 text-white font-semibold p-3 rounded-lg hover:bg-green-600 transition">
            Send Message
        </button>
    </form>
</main>

</body>
</html>
